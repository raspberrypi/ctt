<!DOCTYPE html>
<!-- SPDX-License-Identifier: BSD-2-Clause / Copyright (C) 2026, Raspberry Pi -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Raspberry Pi Camera Tuning Tool{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='fonts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v={{ asset_v }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='rpi-logo.svg') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <img src="{{ url_for('static', filename='rpi-logo.svg') }}" alt="Raspberry Pi" class="logo">
      Raspberry&nbsp;Pi <small>Camera Tuning Tool</small>
    </a>
    <nav>
      <a href="{{ url_for('projects') }}" class="{{ 'active' if active=='projects' }}">Projects</a>
    </nav>
    {% if project is defined %}<span class="proj-name">{{ project.name }}</span>{% endif %}
    <span class="spacer"></span>
    {% block topbar_status %}{% endblock %}
  </header>
  <main class="container">
    {% block body %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}?v={{ asset_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
